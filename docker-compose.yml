version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: action_gate
      POSTGRES_PASSWORD: action_gate_dev
      POSTGRES_DB: action_gate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U action_gate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
